name: Upload Volleyball Games To MaccabiPedia
on:
  schedule:
    - cron: '0 10,15,21 * * *'  # 1pm, 6pm, midnight IDT (UTC+3)
  workflow_dispatch:
  repository_dispatch:
    types: [ zapier_trigger_volleyball_upload_game ]

jobs:
  upload-volleyball-games-to-maccabipedia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
          architecture: x64
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync
      - name: Try curl
        run: curl -I https://www.iva.org.il/team.asp?TeamId=17029&cYear=2025 || echo "Failed"
      - name: Upload Volleyball Games To MaccabiPedia
        env:
          PYWIKIBOT_DIR: packages/maccabipediabot/src/maccabipediabot/pywikibot_configs/
          MACCABIPEDIA_BOT_USERNAME: ${{ secrets.MACCABIPEDIA_BOT_USERNAME }}
          MACCABIPEDIA_BOT_PASSWORD: ${{ secrets.MACCABIPEDIA_BOT_PASSWORD }}
        run: uv run python -m maccabipediabot.volleyball.upload_volleyball_games_from_iva_site
