[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "maccabipedia-mcp"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=2.0",
    "requests>=2.32",
]

[dependency-groups]
dev = ["responses>=0.25"]

[tool.setuptools.packages.find]
where = ["src"]
