[tool.uv.workspace]
members = ["packages/*"]

[tool.uv]
dev-dependencies = ["pytest>=8.0"]

[tool.pytest.ini_options]
testpaths = [
    "packages/maccabipediabot/tests",
    "packages/maccabipedia-mcp/tests",
    "packages/maccabistats/tests",
    "infra/local-wiki/tests",
]
# Make `conftest.py` importable from sibling test files (no __init__.py per
# project convention, so `from conftest import …` would otherwise fail).
pythonpath = ["infra/local-wiki/tests"]
addopts = "-m 'not integration'"
markers = [
    "integration: tests that hit the live MaccabiPedia API (deselected by default)",
]
